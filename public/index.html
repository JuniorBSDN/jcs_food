<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCS FOODS - Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .cart-item-enter { animation: slideIn 0.3s forwards; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        /* Ocultar barra de rolagem mas manter funcional */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20 md:pb-0">

    <!-- Header com Logo e Cores Originais JSC FOOD -->
    <header class="bg-gray-900 text-white shadow-lg sticky top-0 z-40 border-b-4 border-red-600">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://i.imgur.com/zjaVmuG.jpeg" alt="JSC FOOD" class="w-16 h-16 rounded-full border-2 border-white object-cover shadow-sm">
                <h1 class="text-2xl font-black tracking-wider uppercase">JCS FOODS</h1>
            </div>

            <div class="flex items-center">
                <button id="cart-btn" class="relative bg-red-600 p-2.5 rounded-full hover:bg-red-700 transition shadow-md">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-yellow-400 text-black rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shadow">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Menu Section -->
    <section id="menu" class="py-10 bg-gray-50">
        <div class="container mx-auto px-4">
            <!-- Filtros de Categoria -->
            <div class="flex justify-center mb-8 overflow-x-auto pb-2 scrollbar-hide">
                <div class="flex space-x-2 bg-white p-1 rounded-full shadow-sm whitespace-nowrap border border-gray-200">
                    <button class="category-btn px-6 py-2 rounded-full bg-red-600 text-white font-bold transition" data-category="all">Todos</button>
                    <button class="category-btn px-6 py-2 rounded-full font-bold text-gray-600 hover:bg-gray-100 transition" data-category="burgers">Hambúrgueres</button>
                    <button class="category-btn px-6 py-2 rounded-full font-bold text-gray-600 hover:bg-gray-100 transition" data-category="sides">Acompanhamentos</button>
                    <button class="category-btn px-6 py-2 rounded-full font-bold text-gray-600 hover:bg-gray-100 transition" data-category="drinks">Bebidas</button>
                </div>
            </div>

            <!-- Grade de Produtos -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="menu-items">
                <!-- Preenchido via JS dinamicamente pelo Banco de Dados -->
                <div class="col-span-full text-center py-10">
                    <i class="fas fa-spinner fa-spin text-4xl text-red-600 mb-4"></i>
                    <p class="text-gray-500 font-bold">Carregando cardápio fresquinho...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- ================= MODAL DE IMAGEM AMPLIADA ================= -->
    <div id="image-modal" class="fixed inset-0 bg-black bg-opacity-90 z-[60] hidden flex justify-center items-center backdrop-blur-sm transition-opacity">
        <button onclick="closeImageModal()" class="absolute top-6 right-6 text-white hover:text-red-500 text-4xl transition z-10">
            <i class="fas fa-times"></i>
        </button>
        <img id="modal-image-src" src="" alt="Imagem Ampliada" class="max-w-[90%] max-h-[90vh] object-contain rounded-xl shadow-2xl">
    </div>

    <!-- ================= MODAL DA SACOLA ================= -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-white shadow-2xl transform translate-x-full transition-transform duration-300 z-50 flex flex-col">

        <!-- Header da Sacola -->
        <div class="p-5 bg-gray-900 text-white flex justify-between items-center shadow-md">
            <h3 class="text-xl font-bold flex items-center"><i class="fas fa-shopping-bag mr-2 text-red-500"></i> Sua Sacola</h3>
            <button id="close-cart" class="w-8 h-8 flex items-center justify-center bg-gray-800 rounded-full text-gray-300 hover:text-white transition">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- Área Rolável (Itens + Informações de Envio) -->
        <div class="flex-1 overflow-y-auto p-5 scrollbar-hide bg-gray-50">

            <!-- Mensagem de Carrinho Vazio -->
            <div class="text-center py-12 text-gray-400 block" id="empty-cart-message">
                <i class="fas fa-shopping-bag text-6xl mb-4 opacity-50"></i>
                <p class="text-lg font-medium">Sua sacola está vazia</p>
            </div>

            <!-- Container para os Itens do Carrinho -->
            <div id="cart-items" class="space-y-4 mb-6">
                <!-- Preenchido via JS -->
            </div>

            <!-- Formulário de Informações do Cliente -->
            <div id="checkout-form" class="hidden bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h4 class="font-bold text-gray-800 mb-4 border-b pb-2 flex items-center">
                    <i class="fas fa-motorcycle text-red-600 mr-2"></i> Informações de Envio
                </h4>

                <div class="space-y-4">
                    <input type="text" id="cli-nome" placeholder="Seu nome completo" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" required>
                    <input type="tel" id="cli-tel" placeholder="WhatsApp para contato" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" required>
                    <input type="text" id="cli-end" placeholder="Endereço de Entrega (Rua, Bairro, Número)" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" required>
                    <input type="text" id="cli-ref" placeholder="Ponto de Referência (Obrigatório)*" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none bg-yellow-50 placeholder-gray-600 transition" required>
                    
                    <select id="cli-pag" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none font-semibold text-gray-700 transition" required>
                        <option value="">Formas de Pagamento...</option>
                        <option value="PIX">PIX</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão de Crédito">Cartão de Crédito (Máquina)</option>
                        <option value="Cartão de Débito">Cartão de Débito (Máquina)</option>
                    </select>

                    <!-- CAMPO DE TROCO DINÂMICO (Fica escondido por padrão) -->
                    <div id="div-troco" class="hidden transition-all duration-300">
                        <label class="block text-sm font-bold text-gray-600 mb-1 pl-1">Troco para quanto?</label>
                        <input type="number" id="cli-troco" placeholder="Ex: 50 (Deixe em branco se não precisar)" class="w-full p-3 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition bg-green-50">
                    </div>
                </div>
            </div>
        </div>

        <!-- Rodapé Fixo (Total + Botão WhatsApp) -->
        <div class="p-5 border-t border-gray-200 bg-white shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div id="taxa-aviso" class="flex justify-between items-center text-sm text-gray-500 mb-2 hidden">
                <span>Taxa de entrega:</span>
                <span>R$ 5,00</span>
            </div>
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-800 font-bold text-lg">Total do Pedido:</span>
                <span id="cart-total" class="text-2xl font-black text-red-600">R$ 0,00</span>
            </div>

            <button id="btn-enviar-whatsapp" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl transition flex justify-center items-center text-lg shadow-md disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                <i class="fab fa-whatsapp text-2xl mr-2"></i> Enviar Pedido
            </button>
        </div>
    </div>

    <!-- Backdrop escuro -->
    <div id="backdrop" class="fixed inset-0 bg-black bg-opacity-60 z-40 hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Notificação de Sucesso -->
    <div id="success-notification" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center translate-y-24 transition-transform duration-300 z-50 border border-gray-700">
        <i class="fas fa-check text-green-400 mr-2 text-xl"></i>
        <span class="font-semibold">Adicionado à sacola!</span>
    </div>

    <script>
        // ================= DADOS DO RESTAURANTE =================
        const NUMERO_WHATSAPP = "fone";
        const TAXA_ENTREGA = 5.00;

        let menuItems = [];
        let cart = [];

        // ================= ELEMENTOS DO DOM =================
        const menuItemsContainer = document.getElementById('menu-items');
        const cartBtn = document.getElementById('cart-btn');
        const cartSidebar = document.getElementById('cart-sidebar');
        const closeCartBtn = document.getElementById('close-cart');
        const cartItemsContainer = document.getElementById('cart-items');
        const emptyCartMessage = document.getElementById('empty-cart-message');
        const cartCount = document.getElementById('cart-count');
        const cartTotal = document.getElementById('cart-total');
        const btnEnviarWhatsapp = document.getElementById('btn-enviar-whatsapp');
        const checkoutFormDiv = document.getElementById('checkout-form');
        const backdrop = document.getElementById('backdrop');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const taxaAviso = document.getElementById('taxa-aviso');
        
        // Elementos do Troco
        const cliPag = document.getElementById('cli-pag');
        const divTroco = document.getElementById('div-troco');
        const inputTroco = document.getElementById('cli-troco');

        // ================= INICIALIZAÇÃO =================
        function init() {
            carregarProdutos();
            setupEventListeners();
        }

        // ================= LÓGICA DO MODAL DE IMAGEM =================
        function openImageModal(imgSrc) {
            const modal = document.getElementById('image-modal');
            document.getElementById('modal-image-src').src = imgSrc;
            modal.classList.remove('hidden');
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
        }

        document.getElementById('image-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeImageModal();
            }
        });

        // ================= BUSCAR DADOS NA API (PYTHON) =================
        async function carregarProdutos() {
            try {
                const response = await fetch('/api/produtos');
                if (!response.ok) throw new Error('Erro na resposta do servidor');
                
                const produtosDB = await response.json();
                
                menuItems = produtosDB.map(p => {
                    let catTag = 'burgers';
                    if(p.categoria === 'Acompanhamentos') catTag = 'sides';
                    if(p.categoria === 'Bebidas') catTag = 'drinks';

                    return {
                        id: p.id.toString(),
                        name: p.nome,
                        description: p.descricao,
                        price: parseFloat(p.preco),
                        category: catTag,
                        img: p.foto
                    };
                });

                renderMenuItems('all');
            } catch (error) {
                console.error("Erro ao carregar cardápio:", error);
                menuItemsContainer.innerHTML = `
                    <div class="col-span-full text-center py-10">
                        <i class="fas fa-exclamation-triangle text-4xl text-yellow-500 mb-4"></i>
                        <p class="text-gray-600 font-bold">Não foi possível carregar o cardápio agora.</p>
                        <p class="text-sm text-gray-400">Verifique sua conexão ou tente recarregar a página.</p>
                    </div>`;
            }
        }

        function renderMenuItems(category = 'all') {
            menuItemsContainer.innerHTML = '';
            const filteredItems = category === 'all' ? menuItems : menuItems.filter(item => item.category === category);

            if (filteredItems.length === 0) {
                menuItemsContainer.innerHTML = '<p class="col-span-full text-center text-gray-500">Nenhum produto nesta categoria.</p>';
                return;
            }

            filteredItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'menu-item bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col transition duration-300';
                
                div.innerHTML = `
                    <div class="relative h-48 overflow-hidden bg-gray-900 cursor-pointer group" onclick="openImageModal('${item.img}')">
                        <img src="${item.img}" class="absolute inset-0 w-full h-full object-cover opacity-50 blur-lg scale-110" alt="">
                        <img src="${item.img}" alt="${item.name}" class="relative w-full h-full object-contain p-1 group-hover:scale-105 transition-transform duration-300 drop-shadow-2xl">
                        <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-30 transition duration-300 flex items-center justify-center z-10">
                            <i class="fas fa-search-plus text-white opacity-0 group-hover:opacity-100 text-3xl drop-shadow-md transition duration-300"></i>
                        </div>
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <h3 class="text-xl font-bold text-gray-800 mb-1">${item.name}</h3>
                        <p class="text-sm text-gray-500 mb-4 flex-1">${item.description}</p>
                        <div class="flex justify-between items-center mt-auto border-t border-gray-100 pt-4">
                            <span class="text-2xl font-black text-gray-900">R$ ${item.price.toFixed(2).replace('.', ',')}</span>
                            <button class="add-to-cart bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-lg font-bold transition shadow-sm"
                                    data-id="${item.id}" data-name="${item.name}" data-price="${item.price}" data-img="${item.img}">
                                <i class="fas fa-plus mr-1"></i> Pedir
                            </button>
                        </div>
                    </div>
                `;
                menuItemsContainer.appendChild(div);
            });

            document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', addToCart));
        }

        // ================= EVENT LISTENERES =================
        function setupEventListeners() {
            cartBtn.addEventListener('click', toggleCart);
            closeCartBtn.addEventListener('click', toggleCart);
            backdrop.addEventListener('click', toggleCart);

            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const category = btn.dataset.category;
                    categoryBtns.forEach(b => {
                        b.classList.remove('bg-red-600', 'text-white');
                        b.classList.add('text-gray-600', 'hover:bg-gray-100');
                    });
                    btn.classList.add('bg-red-600', 'text-white');
                    btn.classList.remove('text-gray-600', 'hover:bg-gray-100');
                    renderMenuItems(category);
                });
            });

            // Lógica para mostrar/esconder o campo de Troco
            cliPag.addEventListener('change', function(e) {
                if (e.target.value === 'Dinheiro') {
                    divTroco.classList.remove('hidden');
                } else {
                    divTroco.classList.add('hidden');
                    inputTroco.value = ''; // Limpa o valor se mudar de ideia
                }
            });

            btnEnviarWhatsapp.addEventListener('click', finalizarPedidoWhatsApp);
        }

        // ================= LÓGICA DO CARRINHO =================
        function addToCart(e) {
            const btn = e.target.closest('.add-to-cart');
            const { id, name, price, img } = btn.dataset;
            const floatPrice = parseFloat(price);

            const existingItem = cart.find(item => item.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ id, name, price: floatPrice, img, quantity: 1 });
            }

            updateCartUI();
            showNotification();
        }

        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;

            cartItemsContainer.innerHTML = '';

            if (cart.length === 0) {
                emptyCartMessage.classList.remove('hidden');
                checkoutFormDiv.classList.add('hidden');
                taxaAviso.classList.add('hidden');
                btnEnviarWhatsapp.disabled = true;
                cartTotal.textContent = "R$ 0,00";
            } else {
                emptyCartMessage.classList.add('hidden');
                checkoutFormDiv.classList.remove('hidden');
                taxaAviso.classList.remove('hidden');
                btnEnviarWhatsapp.disabled = false;

                cart.forEach(item => {
                    cartItemsContainer.innerHTML += `
                        <div class="cart-item-enter flex items-center bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                            <div class="relative w-16 h-16 rounded-lg overflow-hidden mr-4 border border-gray-200 bg-gray-900">
                                <img src="${item.img}" class="absolute inset-0 w-full h-full object-cover blur-sm opacity-50 scale-110">
                                <img src="${item.img}" class="relative w-full h-full object-contain drop-shadow-md p-0.5">
                            </div>
                            <div class="flex-grow">
                                <h4 class="font-bold text-gray-800 text-sm mb-1">${item.name}</h4>
                                <span class="font-semibold text-gray-500 text-sm">R$ ${item.price.toFixed(2).replace('.', ',')}</span>
                            </div>
                            <div class="flex items-center border border-gray-200 rounded-full px-2 py-1 bg-gray-50 ml-2">
                                <button class="text-gray-500 hover:text-red-600 w-6 flex items-center justify-center font-bold text-lg transition" onclick="changeQuantity('${item.id}', -1)">-</button>
                                <span class="mx-1 font-bold text-sm w-5 text-center text-gray-800">${item.quantity}</span>
                                <button class="text-gray-500 hover:text-green-600 w-6 flex items-center justify-center font-bold text-lg transition" onclick="changeQuantity('${item.id}', 1)">+</button>
                            </div>
                        </div>
                    `;
                });

                const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const total = subtotal + TAXA_ENTREGA;
                cartTotal.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
            }
        }

        window.changeQuantity = function(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                updateCartUI();
            }
        }

        function toggleCart() {
            cartSidebar.classList.toggle('translate-x-full');
            backdrop.classList.toggle('hidden');
        }

        function showNotification() {
            const notif = document.getElementById('success-notification');
            notif.classList.remove('translate-y-24');
            setTimeout(() => notif.classList.add('translate-y-24'), 2500);
        }

        // ================= ENVIAR PARA WHATSAPP =================
        async function finalizarPedidoWhatsApp() {
            const nome = document.getElementById('cli-nome').value.trim();
            const tel = document.getElementById('cli-tel').value.trim();
            const end = document.getElementById('cli-end').value.trim();
            const ref = document.getElementById('cli-ref').value.trim();
            const pag = document.getElementById('cli-pag').value;
            const troco = document.getElementById('cli-troco').value.trim();

            if(!nome || !tel || !end || !ref || !pag) {
                alert("Por favor, preencha todas as informações de envio (incluindo a referência) para enviar o pedido.");
                return;
            }

            // Tratamento da forma de pagamento + troco
            let formaPagamentoFormatada = pag;
            if (pag === 'Dinheiro') {
                if (troco) {
                    formaPagamentoFormatada += ` (Troco para R$ ${troco})`;
                } else {
                    formaPagamentoFormatada += ` (Sem troco)`;
                }
            }

            const idPedido = Math.floor(1000 + Math.random() * 9000);

            let itensTexto = "";
            let subtotal = 0;
            cart.forEach(item => {
                let linhaTotal = item.price * item.quantity;
                subtotal += linhaTotal;
                itensTexto += `▪️ ${item.quantity}x ${item.name} - R$ ${linhaTotal.toFixed(2).replace('.', ',')}\n`;
            });

            let totalFinal = subtotal + TAXA_ENTREGA;

            try {
                await fetch('/api/pedidos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_pedido: idPedido,
                        cliente_nome: nome,
                        telefone: tel,
                        endereco: `${end} (Ref: ${ref})`,
                        forma_pagamento: formaPagamentoFormatada, // Envia com o aviso de troco
                        itens: itensTexto.replace(/\n/g, ', '), 
                        total: totalFinal,
                        status: "Aguardando Pagamento"
                    })
                });
            } catch (e) {
                console.error("Falha ao salvar no banco, mas prosseguindo com o WhatsApp...", e);
            }

            let mensagem = `*NOVO PEDIDO - #${idPedido}* 🍔\n\n`;
            mensagem += `👤 Nome: ${nome}\n📱 Contato: ${tel}\n\n`;
            mensagem += `*ENDEREÇO DE ENTREGA*\n📍 ${end}\n📌 Ref: ${ref}\n\n`;
            mensagem += `*RESUMO DO PEDIDO*\n${itensTexto}`;
            mensagem += `\n🛵 Entrega: R$ ${TAXA_ENTREGA.toFixed(2).replace('.', ',')}\n`;
            mensagem += `💰 *TOTAL A PAGAR: R$ ${totalFinal.toFixed(2).replace('.', ',')}*\n\n`;
            mensagem += `💳 Pagamento: ${formaPagamentoFormatada}\n`;

            window.open(`https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(mensagem)}`, '_blank');

            cart = [];
            updateCartUI();
            toggleCart();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
